<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Button Grid</title>
    <!-- Modern Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Theme Tokens */
            --bg-color: #0f172a; /* Deep elegant slate */
            --btn-gap: 16px;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --secondary-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --tertiary-gradient: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            --quaternary-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
        }

        /* Beautiful Heading */
        h1 {
            color: #f8fafc;
            font-size: 2.25rem;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: -0.02em;
        }

        /* Responsive Grid Container */
        .btn-grid {
            display: grid;
            /* 1 column on mobile by default */
            grid-template-columns: 1fr;
            /* 16px between buttons as specified */
            gap: var(--btn-gap);
            width: 100%;
            max-width: 800px;
        }

        /* 2 columns on desktop */
        @media (min-width: 768px) {
            .btn-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Premium Styled Buttons */
        .grid-button {
            position: relative;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 20px 24px;
            color: var(--text-color);
            font-size: 1.125rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            background: rgba(255, 255, 255, 0.05); /* Glass base */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle stroke */
            border-radius: 16px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            -webkit-tap-highlight-color: transparent;
            outline: none;
            backdrop-filter: blur(10px);
        }

        /* Coloring for variation */
        .grid-button.blue { background: var(--primary-gradient); box-shadow: 0 8px 24px -4px rgba(37, 99, 235, 0.3); border: none; }
        .grid-button.green { background: var(--secondary-gradient); box-shadow: 0 8px 24px -4px rgba(16, 185, 129, 0.3); border: none; }
        .grid-button.purple { background: var(--tertiary-gradient); box-shadow: 0 8px 24px -4px rgba(139, 92, 246, 0.3); border: none; }
        .grid-button.orange { background: var(--quaternary-gradient); box-shadow: 0 8px 24px -4px rgba(245, 158, 11, 0.3); border: none; }

        /* Dynamic Hover States */
        .grid-button:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }

        .grid-button.blue:hover { box-shadow: 0 12px 32px -4px rgba(37, 99, 235, 0.6); }
        .grid-button.green:hover { box-shadow: 0 12px 32px -4px rgba(16, 185, 129, 0.6); }
        .grid-button.purple:hover { box-shadow: 0 12px 32px -4px rgba(139, 92, 246, 0.6); }
        .grid-button.orange:hover { box-shadow: 0 12px 32px -4px rgba(245, 158, 11, 0.6); }

        /* Active State */
        .grid-button:active {
            transform: translateY(2px) scale(0.98);
            filter: brightness(0.95);
        }

        /* Glassmorphism Shine */
        .grid-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.25),
                transparent
            );
            transition: left 0.6s ease;
        }

        .grid-button:hover::after {
            left: 100%;
        }

        .btn-content {
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10; /* Keep content above shine layer */
        }
    </style>
</head>
<body>

    <h1>Responsive Grid</h1>

    <div class="btn-grid">
        <button class="grid-button blue" onclick="buttonClick()">
            <div class="btn-content">
                <span>Dashboard</span>
            </div>
        </button>
        <button class="grid-button green" onclick="buttonClick()">
            <div class="btn-content">
                <span>Settings</span>
            </div>
        </button>
        <button class="grid-button purple" onclick="buttonClick()">
            <div class="btn-content">
                <span>Analytics</span>
            </div>
        </button>
        <button class="grid-button orange" onclick="buttonClick()">
            <div class="btn-content">
                <span>Profile</span>
            </div>
        </button>
        <button class="grid-button blue" onclick="buttonClick()">
            <div class="btn-content">
                <span>Messages</span>
            </div>
        </button>
        <button class="grid-button purple" onclick="buttonClick()">
            <div class="btn-content">
                <span>Logout</span>
            </div>
        </button>
    </div>

    <script>
        function buttonClick() {
            if (navigator.vibrate) {
                // Short haptic vibration
                navigator.vibrate(40); 
            }
        }
    </script>
</body>
</html>
