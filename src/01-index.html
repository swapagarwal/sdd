<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Click Button</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; /* Stacks button and message vertically */
            background-color: #0f172a; /* Deep premium background */
            font-family: 'Inter', sans-serif;
            gap: 24px;
        }

        /* Beautifully styled button */
        .styled-button {
            color: white;
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 9999px; /* Fully rounded pill shape */
            padding: 16px 40px;
            cursor: pointer;
            box-shadow: 0 8px 24px -4px rgba(37, 99, 235, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hover shimmer effect */
        .styled-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .styled-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -4px rgba(37, 99, 235, 0.8);
        }

        .styled-button:hover::before {
            left: 100%;
        }

        .styled-button:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.5);
        }

        /* Premium message styling */
        .message-box {
            color: #e2e8f0;
            font-size: 1.05rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-15px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 14px 28px;
            /* Glassmorphism effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .message-box.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <button id="click-action-btn" class="styled-button">
        Click me
    </button>
    
    <div id="status-message" class="message-box"></div>

    <script>
        const btn = document.getElementById('click-action-btn');
        const messageBox = document.getElementById('status-message');

        btn.addEventListener('click', () => {
            // Update the text Content
            messageBox.textContent = "Button clicked";
            
            // Add the class to animate the message into view
            messageBox.classList.add('show');
            
            // Optional: subtle vibration effect on the button click using Web API if supported
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        });
    </script>
</body>
</html>
