<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Independent Counters</title>
    <!-- Modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-color: #0d1117; /* Deep premium dark background */
            font-family: 'Outfit', sans-serif;
            gap: 40px;
        }

        .header {
            color: #f0f6fc;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-bottom: 20px;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 800px;
            padding: 0 32px;
            justify-items: center;
        }

        /* Base styled button */
        .counter-btn {
            color: white;
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            /* Gradient for different buttons */
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); 
            border: none;
            border-radius: 16px;
            padding: 20px 32px;
            cursor: pointer;
            box-shadow: 0 8px 24px -4px rgba(109, 40, 217, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            width: 100%;
        }

        /* Make them look distinct by using child selectors */
        .counter-btn:nth-child(1) { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); box-shadow: 0 8px 24px -4px rgba(185, 28, 28, 0.4); }
        .counter-btn:nth-child(2) { background: linear-gradient(135deg, #f59e0b 0%, #b45309 100%); box-shadow: 0 8px 24px -4px rgba(180, 83, 9, 0.4); }
        .counter-btn:nth-child(3) { background: linear-gradient(135deg, #10b981 0%, #047857 100%); box-shadow: 0 8px 24px -4px rgba(4, 120, 87, 0.4); }
        .counter-btn:nth-child(4) { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 8px 24px -4px rgba(29, 78, 216, 0.4); }
        .counter-btn:nth-child(5) { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); box-shadow: 0 8px 24px -4px rgba(109, 40, 217, 0.4); }

        .counter-btn:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
        }

        .counter-btn:hover:nth-child(1) { box-shadow: 0 12px 28px -4px rgba(185, 28, 28, 0.7); }
        .counter-btn:hover:nth-child(2) { box-shadow: 0 12px 28px -4px rgba(180, 83, 9, 0.7); }
        .counter-btn:hover:nth-child(3) { box-shadow: 0 12px 28px -4px rgba(4, 120, 87, 0.7); }
        .counter-btn:hover:nth-child(4) { box-shadow: 0 12px 28px -4px rgba(29, 78, 216, 0.7); }
        .counter-btn:hover:nth-child(5) { box-shadow: 0 12px 28px -4px rgba(109, 40, 217, 0.7); }

        .counter-btn:active {
            transform: translateY(2px) scale(0.96);
        }

        .click-count {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1;
        }

        .btn-label {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        /* Shimmer effect inside buttons */
        .counter-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.6s ease;
        }

        .counter-btn:hover::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <div class="header">Interactive Counters</div>

    <div class="button-container">
        <!-- We create 5 independent buttons -->
        <button class="counter-btn" onclick="increment(this)">
            <span class="click-count">0</span>
            <span class="btn-label">Clicks</span>
        </button>
        <button class="counter-btn" onclick="increment(this)">
            <span class="click-count">0</span>
            <span class="btn-label">Clicks</span>
        </button>
        <button class="counter-btn" onclick="increment(this)">
            <span class="click-count">0</span>
            <span class="btn-label">Clicks</span>
        </button>
        <button class="counter-btn" onclick="increment(this)">
            <span class="click-count">0</span>
            <span class="btn-label">Clicks</span>
        </button>
        <button class="counter-btn" onclick="increment(this)">
            <span class="click-count">0</span>
            <span class="btn-label">Clicks</span>
        </button>
    </div>
    
    <script>
        function increment(button) {
            // Find the count span within the clicked button
            const countElement = button.querySelector('.click-count');
            
            // Get current count and increment
            let currentCount = parseInt(countElement.innerText, 10);
            currentCount++;
            
            // Update the display
            countElement.innerText = currentCount;
            
            // Optional: subtle popup animation on the number
            countElement.style.transform = 'scale(1.3)';
            countElement.style.transition = 'transform 0.1s ease';
            
            setTimeout(() => {
                countElement.style.transform = 'scale(1)';
            }, 100);
            
            // Optional: haptic feedback
            if (navigator.vibrate) {
                navigator.vibrate(30); 
            }
        }
    </script>
</body>
</html>
